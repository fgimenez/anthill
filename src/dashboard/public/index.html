<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🐜 Anthill</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; height: 100vh; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto auto auto 1fr auto auto; }

    header { grid-column: 1/-1; grid-row: 1; padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; color: #fff; }
    header .status { font-size: 0.75rem; color: #555; }

    #control-bar { grid-column: 1/-1; grid-row: 3; padding: 8px 20px; border-bottom: 1px solid #222; background: #0d0d0d; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .ctrl-btn { background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 4px; padding: 4px 12px; font-family: inherit; font-size: 0.75rem; cursor: pointer; }
    .ctrl-btn:hover { background: #222; color: #fff; }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }
    .ctrl-btn.danger { border-color: #7f1d1d; color: #fca5a5; }
    .ctrl-btn.danger:hover { background: #2d0f0f; }
    #tick-display { font-size: 0.75rem; color: #555; min-width: 80px; }
    #win-display { font-size: 0.75rem; color: #a78bfa; display: none; }
    .strat-group { display: flex; align-items: center; gap: 4px; }
    .strat-label { font-size: 0.65rem; color: #444; }
    .strat-select { background: #111; color: #888; border: 1px solid #2a2a2a; border-radius: 3px; font-family: inherit; font-size: 0.7rem; padding: 2px 6px; cursor: pointer; }
    .strat-select:hover { border-color: #444; }
    .ctrl-separator { width: 1px; height: 20px; background: #222; margin: 0 4px; }

    #graph { grid-column: 1; grid-row: 4; position: relative; overflow: hidden; }
    #graph svg { width: 100%; height: 100%; }

    #sidebar { grid-column: 2; grid-row: 4; border-left: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
    #leaderboard { padding: 12px; border-bottom: 1px solid #222; }
    #leaderboard h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.78rem; border-bottom: 1px solid #111; }
    .lb-row .name { color: #aaa; }
    .lb-row .score { color: #4ade80; font-weight: bold; }
    .lb-row.exited .score { color: #a78bfa; }
    .lb-row.exited .name::after { content: ' ✓'; color: #a78bfa; font-size: 0.65rem; }
    .lb-row.winner-row { border-left: 2px solid #fbbf24; padding-left: 6px; }
    .lb-row.winner-row .name { color: #fbbf24; }
    .lb-row.winner-row .name::before { content: '🏆 '; font-size: 0.7rem; }

    #feed { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; }
    #feed h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .event { font-size: 0.72rem; padding: 4px 0; border-bottom: 1px solid #111; color: #777; animation: fadein 0.3s; }
    .event.payment { color: #38bdf8; }
    .event.merge { color: #f59e0b; }
    .event.price-change { color: #a3e635; }
    .event.decision { color: #888; }
    @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    #chronicle { grid-column: 1/-1; grid-row: 5; border-top: 1px solid #222; background: #060606; display: flex; flex-direction: column; height: 160px; }
    #chronicle h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; padding: 8px 20px 4px; flex-shrink: 0; }
    #chronicle-entries { flex: 1; overflow-y: scroll; padding: 0 20px 10px; display: flex; flex-direction: column; gap: 10px; }
    .chronicle-entry { font-size: 0.82rem; line-height: 1.6; color: #c0a96e; padding: 8px 12px; border-left: 2px solid #3a2e1a; background: #0d0b07; }
    .chronicle-entry .tick-label { font-size: 0.65rem; color: #555; margin-bottom: 4px; }

    footer { grid-column: 1/-1; grid-row: 6; padding: 6px 20px; border-top: 1px solid #222; font-size: 0.65rem; color: #333; }

    /* Graph nodes */
    .node circle { stroke-width: 2; cursor: pointer; }
    .node text { font-size: 10px; fill: #ccc; pointer-events: none; }
    .link { stroke: #2a2a2a; stroke-opacity: 0.8; stroke-width: 1.5; }
    .link.confirmed { stroke: #444; stroke-opacity: 1; stroke-width: 2; }
    .link.active { stroke: #38bdf8; stroke-opacity: 1; stroke-width: 2.5; animation: pulse 0.5s; }
    @keyframes pulse { 0% { stroke-opacity: 1; } 100% { stroke-opacity: 0.2; } }
    .node.winner circle { stroke: #fbbf24 !important; stroke-width: 4 !important; filter: drop-shadow(0 0 10px #fbbf24); animation: winner-glow 1.5s ease-in-out infinite; }
    @keyframes winner-glow { 0%, 100% { filter: drop-shadow(0 0 6px #fbbf24); } 50% { filter: drop-shadow(0 0 22px #fbbf24); } }

    /* Winner banner */
    #winner-banner { display: none; grid-column: 1/-1; grid-row: 2; padding: 10px 20px; background: linear-gradient(90deg, #0a0a0a 0%, #1a1400 40%, #0a0a0a 100%); border-bottom: 1px solid #fbbf24; text-align: center; }
    #winner-banner .trophy { font-size: 1.2rem; }
    #winner-banner .name { color: #fbbf24; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }
    #winner-banner .reason { color: #555; font-size: 0.7rem; margin-top: 2px; }

    /* Price chart */
    #price-chart { height: 100px; border-top: 1px solid #222; padding: 8px 12px; }
    #price-chart h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    #price-chart canvas { width: 100%; height: 70px; }
  </style>
</head>
<body>
  <header>
    <a href="/" style="color:#555;font-size:0.75rem;text-decoration:none;" title="Back to main">← home</a>
    <h1>🐜 Anthill</h1>
    <span class="status" id="conn-status">connecting…</span>
    <span class="status" id="event-count">0 events</span>
  </header>

  <div id="winner-banner">
    <div class="trophy">🏆</div>
    <div class="name" id="winner-name"></div>
    <div class="reason" id="winner-reason"></div>
  </div>

  <div id="control-bar">
    <span id="tick-display">Tick 0</span>
    <span id="win-display"></span>
    <div class="ctrl-separator"></div>
    <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
    <button class="ctrl-btn" id="btn-resume" style="display:none">▶ Resume</button>
    <button class="ctrl-btn danger" id="btn-restart">↺ Restart</button>
    <div class="ctrl-separator"></div>
    <div class="strat-group"><span class="strat-label">prod 1</span><select class="strat-select" data-label="producer_1"></select></div>
    <div class="strat-group"><span class="strat-label">prod 2</span><select class="strat-select" data-label="producer_2"></select></div>
    <div class="strat-group"><span class="strat-label">proc 1</span><select class="strat-select" data-label="processor_1"></select></div>
    <div class="strat-group"><span class="strat-label">proc 2</span><select class="strat-select" data-label="processor_2"></select></div>
    <div class="strat-group"><span class="strat-label">trader</span><select class="strat-select" data-label="trader"></select></div>
    <div class="strat-group"><span class="strat-label">spec</span><select class="strat-select" data-label="speculator"></select></div>
  </div>

  <div id="graph"><svg></svg></div>

  <div id="sidebar">
    <div id="leaderboard">
      <h2>Leaderboard</h2>
      <div id="lb-rows"></div>
    </div>
    <div id="feed">
      <h2>Live Feed</h2>
      <div id="events-list"></div>
    </div>
    <div id="price-chart">
      <h2>Market Prices</h2>
      <canvas id="price-canvas"></canvas>
    </div>
  </div>

  <div id="chronicle">
    <h2>Chronicle</h2>
    <div id="chronicle-entries"></div>
  </div>

  <footer>MPP · Tempo Moderato · Claude Haiku</footer>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const SIM_ID = window.SIM_ID || 'default'
    const BASE = '/sim/' + SIM_ID
    let eventCount = 0
    const priceHistory = { goods: [], products: [] }
    const MAX_HISTORY = 60
    const nodeStats = {}   // id → { txCount, balance, strategy }
    let winnerLabel = null

    const nodeColors = {
      market:     '#f59e0b',
      producer:   '#4ade80',
      processor:  '#38bdf8',
      trader:     '#c084fc',
      speculator: '#f87171',
    }

    // ── D3 Force Graph ─────────────────────────────────────────────────────────
    const svg = d3.select('#graph svg')
    const g = svg.append('g')
    const linkLayer = g.append('g').attr('class', 'links')
    const nodeLayer = g.append('g').attr('class', 'nodes')

    let nodes = []
    let links = []
    let simulation

    function initSimulation(w, h) {
      simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(180))
        .force('charge', d3.forceManyBody().strength(-600))
        .force('center', d3.forceCenter(w / 2, h / 2))
        .force('collision', d3.forceCollide(d => nodeRadius(d) + 8))
        .on('tick', ticked)
    }

    function ticked() {
      linkLayer.selectAll('.link')
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
      nodeLayer.selectAll('.node')
        .attr('transform', d => `translate(${d.x},${d.y})`)
    }

    // balance is in pathUSD (e.g. 1000000 = 1M pathUSD); scale: 32–100
    function nodeRadius(d) {
      const bal = Number(nodeStats[d.id]?.balance ?? 0)
      return Math.max(32, Math.min(100, 32 + Math.log1p(bal / 80_000) * 28))
    }

    // Tint: green=healthy, amber=struggling, red=near-bust
    function nodeColor(d) {
      const bal = Number(nodeStats[d.id]?.balance ?? -1)
      if (bal < 0) return nodeColors[d.type] ?? '#888'          // unknown — use type color
      if (bal < 50_000) return '#ef4444'                         // red: near bust
      if (bal < 200_000) return '#f59e0b'                        // amber: struggling
      return nodeColors[d.type] ?? '#888'
    }

    const nodeAbbrevMap = {
      producer_1: 'PR1', producer_2: 'PR2',
      processor_1: 'PC1', processor_2: 'PC2',
      trader: 'TR', speculator: 'SP', market: 'MK',
    }
    function nodeAbbrev(d) {
      return nodeAbbrevMap[d.label] || (d.label || d.type).slice(0, 4).toUpperCase()
    }

    function renderGraph() {
      const linkSel = linkLayer.selectAll('.link').data(links, d => `${d.source?.id ?? d.source}-${d.target?.id ?? d.target}`)
      linkSel.enter().append('line').attr('class', 'link')
      linkSel.exit().remove()

      const nodeSel = nodeLayer.selectAll('.node').data(nodes, d => d.id)
      const enter = nodeSel.enter().append('g').attr('class', 'node')
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y })
          .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null }))
      enter.append('circle').attr('stroke', '#fff').attr('stroke-opacity', 0.3)
      enter.append('text').attr('text-anchor', 'middle').attr('dy', 4).text(d => nodeAbbrev(d))
      // Update radius + color on every render (covers both new and existing nodes)
      nodeLayer.selectAll('.node circle')
        .attr('r', d => nodeRadius(d))
        .attr('fill', d => nodeColor(d))
      nodeSel.exit().remove()

      simulation.nodes(nodes)
      simulation.force('link').links(links)
      simulation.alpha(0.3).restart()
    }

    function confirmLink(fromNode, toNode) {
      if (fromNode.id === toNode.id) return
      const existing = links.find(l => (l.source?.id ?? l.source) === fromNode.id && (l.target?.id ?? l.target) === toNode.id)
      if (existing) {
        existing.confirmed = true
        linkLayer.selectAll('.link').filter(d => d === existing).attr('class', 'link confirmed')
      } else {
        const lnk = { source: fromNode.id, target: toNode.id, confirmed: true }
        links.push(lnk)
        renderGraph()
      }
    }

    function flashLink(fromAddr, toUrl) {
      const fromNode = nodes.find(n => n.address === fromAddr)
      const toNode = nodes.find(n => toUrl && toUrl.startsWith(n.url))
      if (!fromNode || !toNode) return
      confirmLink(fromNode, toNode)
      const line = linkLayer.append('line')
        .attr('class', 'link active')
        .attr('x1', fromNode.x).attr('y1', fromNode.y)
        .attr('x2', toNode.x).attr('y2', toNode.y)
      setTimeout(() => line.remove(), 800)
    }

    // ── Leaderboard ────────────────────────────────────────────────────────────
    async function refreshLeaderboard() {
      try {
        const agents = await (await fetch(`${BASE}/agents`)).json()
        const rows = document.getElementById('lb-rows')
        rows.innerHTML = ''
        agents.sort((a, b) => {
          const balA = Number(nodeStats[a.id]?.balance ?? 0)
          const balB = Number(nodeStats[b.id]?.balance ?? 0)
          return balB - balA
        })
        agents.filter(a => a.type !== 'market').forEach(a => {
          const stats = nodeStats[a.id]
          const balance = stats?.balance ?? '—'
          const txCount = stats?.txCount ?? 0
          const div = document.createElement('div')
          const isWinner = winnerLabel && (a.label || a.type) === winnerLabel
          div.className = 'lb-row' + (a.active ? '' : ' exited') + (isWinner ? ' winner-row' : '')
          const exitDisplay = a.exitScore ? Math.floor(Number(a.exitScore) / 1_000_000) + ' ✓' : balance + ' $'
          div.innerHTML = `<span class="name">${a.label || a.type}</span><span class="score">${exitDisplay}</span><span style="font-size:0.65rem;color:#444">${txCount}tx</span>`
          rows.appendChild(div)
        })
      } catch {}
    }

    // ── Feed ───────────────────────────────────────────────────────────────────
    function addFeedEvent(ev) {
      const list = document.getElementById('events-list')
      const div = document.createElement('div')
      div.className = `event ${ev.type}`
      const time = new Date(ev.ts).toLocaleTimeString()
      const who = ev.agentLabel || ev.agentType || '?'
      if (ev.type === 'payment') {
        div.textContent = `${time} 💸 ${who} paid → ${(ev.to || '').replace(/https?:\/\/[^/]+/, '')}`
      } else if (ev.type === 'merge') {
        div.textContent = `${time} 🤝 merge accepted by ${who}`
      } else if (ev.type === 'price-change') {
        div.textContent = `${time} 📈 ${who} price → ${(Number(ev.price || '0') / 1_000_000).toFixed(0)} pathUSD`
      } else if (ev.type === 'decision') {
        div.textContent = `${time} 🧠 ${who} → ${ev.action}`
      }
      list.prepend(div)
      if (list.children.length > 50) list.lastChild.remove()
    }

    // ── Chronicle ──────────────────────────────────────────────────────────────
    function addChronicleEntry(ev) {
      const container = document.getElementById('chronicle-entries')
      const entry = document.createElement('div')
      entry.className = 'chronicle-entry'
      const label = document.createElement('div')
      label.className = 'tick-label'
      label.textContent = `Tick ${ev.tick} · ${new Date(ev.ts).toLocaleTimeString()}`
      entry.appendChild(label)
      const text = document.createElement('div')
      text.textContent = ev.text
      entry.appendChild(text)
      container.appendChild(entry)
      // Auto-scroll to bottom only if user is already near the bottom
      const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60
      if (atBottom) container.scrollTop = container.scrollHeight
    }

    // ── Price Chart ────────────────────────────────────────────────────────────
    function drawPriceChart() {
      const canvas = document.getElementById('price-canvas')
      const ctx = canvas.getContext('2d')
      canvas.width = canvas.offsetWidth * devicePixelRatio
      canvas.height = canvas.offsetHeight * devicePixelRatio
      ctx.scale(devicePixelRatio, devicePixelRatio)
      const w = canvas.offsetWidth, h = canvas.offsetHeight
      ctx.clearRect(0, 0, w, h)
      if (priceHistory.goods.length < 2) return
      const allVals = [...priceHistory.goods, ...priceHistory.products]
      const min = Math.min(...allVals), max = Math.max(...allVals)
      const range = max - min || 1
      const drawLine = (data, color) => {
        ctx.beginPath()
        ctx.strokeStyle = color
        ctx.lineWidth = 1.5
        data.forEach((v, i) => {
          const x = (i / (MAX_HISTORY - 1)) * w
          const y = h - ((v - min) / range) * (h - 10) - 5
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
        })
        ctx.stroke()
      }
      drawLine(priceHistory.goods, '#4ade80')
      drawLine(priceHistory.products, '#38bdf8')
    }

    // ── Registry Polling ───────────────────────────────────────────────────────
    async function pollRegistry() {
      try {
        const agents = await (await fetch(`${BASE}/agents`)).json()
        // Only active, non-market agents belong in the graph
        const graphIds = new Set(agents.filter(a => a.type !== 'market' && a.active).map(a => a.id))

        // Remove nodes that left the graph (acquired, busted, or stale after restart)
        const before = nodes.length
        const removed = new Set(nodes.filter(n => !graphIds.has(n.id)).map(n => n.id))
        if (removed.size) {
          nodes.splice(0, nodes.length, ...nodes.filter(n => !removed.has(n.id)))
          links.splice(0, links.length, ...links.filter(l =>
            !removed.has(l.source?.id ?? l.source) && !removed.has(l.target?.id ?? l.target)
          ))
        }

        const known = new Set(nodes.map(n => n.id))
        let newNodes = before !== nodes.length
        agents.filter(a => a.type !== 'market' && a.active).forEach(a => {
          if (!known.has(a.id)) {
            nodes.push({ id: a.id, type: a.type, label: a.label || a.type, address: a.address, url: a.url, x: 300 + Math.random()*200, y: 200 + Math.random()*200 })
            newNodes = true
          }
        })
        if (newNodes) {
          // Structural baseline links — keep graph connected from the start
          const byType = t => nodes.filter(n => n.type === t)
          const addStructural = (a, b) => {
            if (!a || !b || a.id === b.id) return
            if (!links.find(l => (l.source?.id ?? l.source) === a.id && (l.target?.id ?? l.target) === b.id))
              links.push({ source: a.id, target: b.id, confirmed: false })
          }
          for (const trader of byType('trader')) {
            for (const p of byType('producer'))   addStructural(trader, p)
            for (const p of byType('processor'))  addStructural(trader, p)
          }
          for (const spec of byType('speculator'))
            for (const t of byType('trader'))     addStructural(spec, t)
          for (const proc of byType('processor'))
            for (const p of byType('producer'))   addStructural(proc, p)
        }
        if (nodes.length > 0 && !simulation) {
          const rect = document.getElementById('graph').getBoundingClientRect()
          initSimulation(rect.width, rect.height)
        }
        renderGraph()
        refreshLeaderboard()
      } catch {}
    }

    // ── Agent Status Polling ───────────────────────────────────────────────────
    async function pollAgentStatuses() {
      for (const node of nodes) {
        try {
          const status = await (await fetch(`${node.url}/status`)).json()
          nodeStats[node.id] = { txCount: status.txCount ?? 0, balance: status.balance ?? '0', strategy: status.strategy }
        } catch {}
      }
      // Update node sizes + colors with smooth transition
      nodeLayer.selectAll('.node circle')
        .transition().duration(600)
        .attr('r', d => nodeRadius(d))
        .attr('fill', d => nodeColor(d))
      refreshLeaderboard()
      syncStrategySelects()
    }

    function syncStrategySelects() {
      for (const node of nodes) {
        const stats = nodeStats[node.id]
        if (!stats?.strategy) continue
        const label = node.label || node.type
        const sel = document.querySelector(`.strat-select[data-label="${label}"]`)
        if (sel && sel.value !== stats.strategy) sel.value = stats.strategy
      }
    }

    // ── Market Prices Polling ──────────────────────────────────────────────────
    async function pollMarketPrices() {
      try {
        const agents = await (await fetch(`${BASE}/agents`)).json()
        const market = agents.find(a => a.type === 'market')
        if (!market) return
        const prices = await (await fetch(`${market.url}/prices`)).json()
        const g = Number(prices.goodsBid) / 1e6
        const p = Number(prices.productsBid) / 1e6
        priceHistory.goods.push(g)
        priceHistory.products.push(p)
        if (priceHistory.goods.length > MAX_HISTORY) priceHistory.goods.shift()
        if (priceHistory.products.length > MAX_HISTORY) priceHistory.products.shift()
        drawPriceChart()
      } catch {}
    }

    // ── SSE ────────────────────────────────────────────────────────────────────
    const es = new EventSource(`${BASE}/events`)
    es.onopen = () => { document.getElementById('conn-status').textContent = '● connected' ; document.getElementById('conn-status').style.color = '#4ade80' }
    es.onerror = () => { document.getElementById('conn-status').textContent = '○ reconnecting…'; document.getElementById('conn-status').style.color = '#f87171' }
    es.onmessage = (e) => {
      const ev = JSON.parse(e.data)
      eventCount++
      document.getElementById('event-count').textContent = `${eventCount} events`
      if (ev.type === 'tick') {
        const label = ev.winTicks > 0 ? `Tick ${ev.tick} / ${ev.winTicks}` : `Tick ${ev.tick}`
        document.getElementById('tick-display').textContent = label
      } else if (ev.type === 'game-over') {
        document.getElementById('tick-display').textContent = `Tick ${ev.tick} — done`
        document.getElementById('tick-display').style.color = '#f87171'
        const win = document.getElementById('win-display')
        win.textContent = '🏆 Game over!'
        win.style.display = ''
        document.getElementById('btn-pause').style.display = 'none'
        document.getElementById('btn-resume').style.display = 'none'
      } else if (ev.type === 'winner') {
        winnerLabel = ev.winnerLabel
        const bal = Math.floor(Number(ev.winnerBalance ?? 0)).toLocaleString()
        const reason = ev.winReason === 'last-standing' ? 'last agent standing' : `highest balance at tick ${ev.tick}`
        document.getElementById('winner-name').textContent = `${ev.winnerLabel}  ·  ${bal} pathUSD`
        document.getElementById('winner-reason').textContent = reason
        document.getElementById('winner-banner').style.display = ''
        // Glow the winning node
        nodeLayer.selectAll('.node').classed('winner', d => (d.label || d.type) === ev.winnerLabel)
        refreshLeaderboard()
      } else if (ev.type === 'restarted') {
        document.getElementById('tick-display').textContent = 'Tick 0'
        document.getElementById('tick-display').style.color = '#555'
        document.getElementById('win-display').style.display = 'none'
        document.getElementById('winner-banner').style.display = 'none'
        document.getElementById('btn-pause').style.display = ''
        document.getElementById('btn-resume').style.display = 'none'
        winnerLabel = null
        nodeLayer.selectAll('.node').classed('winner', false)
        // Reset local state including graph nodes/links
        Object.keys(nodeStats).forEach(k => delete nodeStats[k])
        nodes.length = 0
        links.length = 0
        if (simulation) { simulation.stop(); simulation = null }
        priceHistory.goods.length = 0
        priceHistory.products.length = 0
        document.getElementById('events-list').innerHTML = ''
        document.getElementById('chronicle-entries').innerHTML = ''
        renderGraph()
      } else if (ev.type === 'narration') {
        addChronicleEntry(ev)
      } else {
        addFeedEvent(ev)
        if (ev.type === 'payment') flashLink(ev.from, ev.to)
      }
    }

    // ── Control Box ────────────────────────────────────────────────────────────
    async function loadControlState() {
      try {
        const state = await (await fetch(`${BASE}/control/state`)).json()
        const label = state.winTicks > 0 ? `Tick ${state.tick} / ${state.winTicks}` : `Tick ${state.tick}`
        document.getElementById('tick-display').textContent = label
        if (state.paused) {
          document.getElementById('btn-pause').style.display = 'none'
          document.getElementById('btn-resume').style.display = ''
        }
      } catch {}
    }

    async function loadStrategies() {
      try {
        const strategies = await (await fetch(`${BASE}/control/strategies`)).json()
        for (const sel of document.querySelectorAll('.strat-select[data-label]')) {
          const label = sel.dataset.label
          const type = label.replace(/_\d+$/, '')          // producer_1 → producer
          const list = strategies[type]
          if (!list) continue
          sel.innerHTML = list.map(s => `<option value="${s.name}">${s.name}</option>`).join('')
          sel.addEventListener('change', () => {
            fetch(`${BASE}/control/strategy/agent/${label}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: sel.value }),
            })
          })
        }
      } catch {}
    }

    document.getElementById('btn-pause').addEventListener('click', async () => {
      await fetch(`${BASE}/control/pause`, { method: 'POST' })
      document.getElementById('btn-pause').style.display = 'none'
      document.getElementById('btn-resume').style.display = ''
    })

    document.getElementById('btn-resume').addEventListener('click', async () => {
      await fetch(`${BASE}/control/resume`, { method: 'POST' })
      document.getElementById('btn-pause').style.display = ''
      document.getElementById('btn-resume').style.display = 'none'
    })

    document.getElementById('btn-restart').addEventListener('click', async () => {
      const btn = document.getElementById('btn-restart')
      btn.disabled = true
      btn.textContent = '↺ Restarting…'
      await fetch(`${BASE}/control/restart`, { method: 'POST' })
      btn.disabled = false
      btn.textContent = '↺ Restart'
    })

    // ── Boot ───────────────────────────────────────────────────────────────────
    loadControlState()
    loadStrategies()
    pollRegistry()
    setInterval(pollRegistry, 5000)
    setTimeout(() => { pollAgentStatuses(); setInterval(pollAgentStatuses, 4000) }, 1000)
    setInterval(pollMarketPrices, 3000)
    window.addEventListener('resize', drawPriceChart)
  </script>
</body>
</html>
