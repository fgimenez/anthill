<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🐜 Anthill</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; height: 100vh; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr auto; }

    header { grid-column: 1/-1; padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; color: #fff; }
    header .status { font-size: 0.75rem; color: #555; }

    #graph { position: relative; overflow: hidden; }
    #graph svg { width: 100%; height: 100%; }

    #sidebar { border-left: 1px solid #222; display: flex; flex-direction: column; }
    #leaderboard { padding: 12px; border-bottom: 1px solid #222; }
    #leaderboard h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.78rem; border-bottom: 1px solid #111; }
    .lb-row .name { color: #aaa; }
    .lb-row .score { color: #4ade80; font-weight: bold; }
    .lb-row.exited .score { color: #a78bfa; }
    .lb-row.exited .name::after { content: ' ✓'; color: #a78bfa; font-size: 0.65rem; }

    #feed { flex: 1; overflow-y: auto; padding: 12px; }
    #feed h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .event { font-size: 0.72rem; padding: 4px 0; border-bottom: 1px solid #111; color: #777; animation: fadein 0.3s; }
    .event.payment { color: #38bdf8; }
    .event.merge { color: #f59e0b; }
    .event.price-change { color: #a3e635; }
    @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    footer { grid-column: 1/-1; padding: 6px 20px; border-top: 1px solid #222; font-size: 0.65rem; color: #333; }

    /* Graph nodes */
    .node circle { stroke-width: 2; cursor: pointer; }
    .node text { font-size: 10px; fill: #ccc; pointer-events: none; }
    .link { stroke: #333; stroke-opacity: 0.6; }
    .link.active { stroke: #38bdf8; stroke-opacity: 1; stroke-width: 2; animation: pulse 0.5s; }
    @keyframes pulse { 0% { stroke-opacity: 1; } 100% { stroke-opacity: 0.2; } }

    /* Price chart */
    #price-chart { height: 100px; border-top: 1px solid #222; padding: 8px 12px; }
    #price-chart h2 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    #price-chart canvas { width: 100%; height: 70px; }
  </style>
</head>
<body>
  <header>
    <h1>🐜 Anthill</h1>
    <span class="status" id="conn-status">connecting…</span>
    <span class="status" id="event-count">0 events</span>
  </header>

  <div id="graph"><svg></svg></div>

  <div id="sidebar">
    <div id="leaderboard">
      <h2>Leaderboard</h2>
      <div id="lb-rows"></div>
    </div>
    <div id="feed">
      <h2>Live Feed</h2>
      <div id="events-list"></div>
    </div>
    <div id="price-chart">
      <h2>Market Prices</h2>
      <canvas id="price-canvas"></canvas>
    </div>
  </div>

  <footer>MPP · Tempo Moderato · Claude Haiku</footer>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const REGISTRY_URL = window.location.origin.replace(/:\d+$/, ':3000')
    let eventCount = 0
    const priceHistory = { goods: [], products: [] }
    const MAX_HISTORY = 60

    const nodeColors = {
      market:     '#f59e0b',
      producer:   '#4ade80',
      processor:  '#38bdf8',
      trader:     '#c084fc',
      speculator: '#f87171',
    }

    // ── D3 Force Graph ─────────────────────────────────────────────────────────
    const svg = d3.select('#graph svg')
    const g = svg.append('g')
    const linkLayer = g.append('g').attr('class', 'links')
    const nodeLayer = g.append('g').attr('class', 'nodes')

    let nodes = []
    let links = []
    let simulation

    function initSimulation(w, h) {
      simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(120))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(w / 2, h / 2))
        .force('collision', d3.forceCollide(40))
        .on('tick', ticked)
    }

    function ticked() {
      linkLayer.selectAll('.link')
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
      nodeLayer.selectAll('.node')
        .attr('transform', d => `translate(${d.x},${d.y})`)
    }

    function renderGraph() {
      const linkSel = linkLayer.selectAll('.link').data(links, d => `${d.source.id}-${d.target.id}`)
      linkSel.enter().append('line').attr('class', 'link')
      linkSel.exit().remove()

      const nodeSel = nodeLayer.selectAll('.node').data(nodes, d => d.id)
      const enter = nodeSel.enter().append('g').attr('class', 'node')
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y })
          .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null }))
      enter.append('circle').attr('r', 24).attr('fill', d => nodeColors[d.type] ?? '#888').attr('stroke', '#fff').attr('stroke-opacity', 0.3)
      enter.append('text').attr('text-anchor', 'middle').attr('dy', 4).text(d => d.type.slice(0, 4).toUpperCase())
      nodeSel.exit().remove()

      simulation.nodes(nodes)
      simulation.force('link').links(links)
      simulation.alpha(0.3).restart()
    }

    function flashLink(fromAddr, toAddr) {
      const fromNode = nodes.find(n => n.address === fromAddr)
      const toNode = nodes.find(n => n.address === toAddr || n.url === toAddr || (toAddr && toAddr.includes(n.type)))
      if (!fromNode || !toNode) return
      const link = { source: fromNode.id, target: toNode.id, _flash: true }
      const line = linkLayer.append('line')
        .attr('class', 'link active')
        .attr('x1', fromNode.x).attr('y1', fromNode.y)
        .attr('x2', toNode.x).attr('y2', toNode.y)
      setTimeout(() => line.remove(), 800)
    }

    // ── Leaderboard ────────────────────────────────────────────────────────────
    async function refreshLeaderboard() {
      try {
        const agents = await (await fetch(`${REGISTRY_URL}/agents`)).json()
        const rows = document.getElementById('lb-rows')
        rows.innerHTML = ''
        agents.forEach(a => {
          const div = document.createElement('div')
          div.className = 'lb-row' + (a.active ? '' : ' exited')
          div.innerHTML = `<span class="name">${a.type}</span><span class="score">${a.exitScore ? a.exitScore + ' ✓' : (a.active ? 'active' : 'bust')}</span>`
          rows.appendChild(div)
        })
      } catch {}
    }

    // ── Feed ───────────────────────────────────────────────────────────────────
    function addFeedEvent(ev) {
      const list = document.getElementById('events-list')
      const div = document.createElement('div')
      div.className = `event ${ev.type}`
      const time = new Date(ev.ts).toLocaleTimeString()
      if (ev.type === 'payment') {
        div.textContent = `${time} 💸 ${ev.agentType} → ${(ev.to || '').replace(/https?:\/\/[^/]+/, '').slice(0, 20)}`
      } else if (ev.type === 'merge') {
        div.textContent = `${time} 🤝 merge accepted by ${ev.agentType}`
      } else {
        div.textContent = `${time} 📈 ${ev.agentType} price → ${(BigInt(ev.price || '0') / 1_000_000n).toString()} pathUSD`
      }
      list.prepend(div)
      if (list.children.length > 50) list.lastChild.remove()
    }

    // ── Price Chart ────────────────────────────────────────────────────────────
    function drawPriceChart() {
      const canvas = document.getElementById('price-canvas')
      const ctx = canvas.getContext('2d')
      canvas.width = canvas.offsetWidth * devicePixelRatio
      canvas.height = canvas.offsetHeight * devicePixelRatio
      ctx.scale(devicePixelRatio, devicePixelRatio)
      const w = canvas.offsetWidth, h = canvas.offsetHeight
      ctx.clearRect(0, 0, w, h)
      if (priceHistory.goods.length < 2) return
      const allVals = [...priceHistory.goods, ...priceHistory.products]
      const min = Math.min(...allVals), max = Math.max(...allVals)
      const range = max - min || 1
      const drawLine = (data, color) => {
        ctx.beginPath()
        ctx.strokeStyle = color
        ctx.lineWidth = 1.5
        data.forEach((v, i) => {
          const x = (i / (MAX_HISTORY - 1)) * w
          const y = h - ((v - min) / range) * (h - 10) - 5
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
        })
        ctx.stroke()
      }
      drawLine(priceHistory.goods, '#4ade80')
      drawLine(priceHistory.products, '#38bdf8')
    }

    // ── Registry Polling ───────────────────────────────────────────────────────
    async function pollRegistry() {
      try {
        const agents = await (await fetch(`${REGISTRY_URL}/agents`)).json()
        const known = new Set(nodes.map(n => n.id))
        agents.forEach(a => {
          if (!known.has(a.id)) {
            nodes.push({ id: a.id, type: a.type, address: a.address, url: a.url, x: 300 + Math.random()*200, y: 200 + Math.random()*200 })
          }
        })
        // Market ↔ Producer, Market ↔ Processor as default edges
        const market = nodes.find(n => n.type === 'market')
        const producer = nodes.find(n => n.type === 'producer')
        const processor = nodes.find(n => n.type === 'processor')
        if (market && producer && !links.find(l => l.source.id === market.id && l.target.id === producer.id)) {
          links.push({ source: market.id, target: producer.id })
        }
        if (market && processor && !links.find(l => l.source.id === market.id && l.target.id === processor.id)) {
          links.push({ source: market.id, target: processor.id })
        }
        if (nodes.length > 0 && !simulation) {
          const rect = document.getElementById('graph').getBoundingClientRect()
          initSimulation(rect.width, rect.height)
        }
        renderGraph()
        refreshLeaderboard()
      } catch {}
    }

    // ── Market Prices Polling ──────────────────────────────────────────────────
    async function pollMarketPrices() {
      try {
        const market = nodes.find(n => n.type === 'market')
        if (!market) return
        const prices = await (await fetch(`${market.url}/prices`)).json()
        const g = Number(prices.goodsBid) / 1e6
        const p = Number(prices.productsBid) / 1e6
        priceHistory.goods.push(g)
        priceHistory.products.push(p)
        if (priceHistory.goods.length > MAX_HISTORY) priceHistory.goods.shift()
        if (priceHistory.products.length > MAX_HISTORY) priceHistory.products.shift()
        drawPriceChart()
      } catch {}
    }

    // ── SSE ────────────────────────────────────────────────────────────────────
    const es = new EventSource('/events')
    es.onopen = () => { document.getElementById('conn-status').textContent = '● connected' ; document.getElementById('conn-status').style.color = '#4ade80' }
    es.onerror = () => { document.getElementById('conn-status').textContent = '○ reconnecting…'; document.getElementById('conn-status').style.color = '#f87171' }
    es.onmessage = (e) => {
      const ev = JSON.parse(e.data)
      eventCount++
      document.getElementById('event-count').textContent = `${eventCount} events`
      addFeedEvent(ev)
      if (ev.type === 'payment') flashLink(ev.from, ev.to)
    }

    // ── Boot ───────────────────────────────────────────────────────────────────
    pollRegistry()
    setInterval(pollRegistry, 5000)
    setInterval(pollMarketPrices, 3000)
    window.addEventListener('resize', drawPriceChart)
  </script>
</body>
</html>
